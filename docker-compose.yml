version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tenderai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pwd
      POSTGRES_DB: tenderai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tenderai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderai-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pwd@db:5432/tenderai
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=super_secure_jwt_token_secret_key_change_in_production_123456
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_discovery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderai-celery-discovery
    command: celery -A workers.celery_app.celery_instance worker --loglevel=info -Q discovery -c 1
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pwd@db:5432/tenderai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_workers:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderai-celery-workers
    command: celery -A workers.celery_app.celery_instance worker --loglevel=info -Q celery -c 4
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pwd@db:5432/tenderai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenderai-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
